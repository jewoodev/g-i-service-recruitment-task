services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: bus_monitoring
      MYSQL_USER: bus_monitoring
      MYSQL_PASSWORD: bus_monitoring
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/bus_monitoring?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_USERNAME: bus_monitoring
      DB_PASSWORD: bus_monitoring
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  mysql-data:
