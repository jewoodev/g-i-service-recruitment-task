spring:
  application:
    name: bus-monitoring
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bus_monitoring?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:bus_monitoring}
    password: ${DB_PASSWORD:bus_monitoring}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
